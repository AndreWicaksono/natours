#import "./Fragments/TourMetaParts.graphql"
#import "./Fragments/TourPreviewParts.graphql"

query Tours(
  $filters: TourFiltersInput
  $pagination: PaginationArg
  $publicationState: PublicationState
  $sort: [String]
) {
  tours(
    filters: $filters
    pagination: $pagination
    publicationState: $publicationState
    sort: $sort
  ) {
    __typename
    ...TourMetaParts
    data {
      id
      attributes {
        createdAt
        publishedAt
        updatedAt
        ...TourPreviewParts
        image {
          data {
            id
            attributes {
              name
              height
              width
              formats
            }
          }
        }
        minimumParticipant
        maximumParticipant
      }
    }
  }
}
