#import "./Fragments/TourMetaParts.graphql"
#import "./Fragments/TourPreviewParts.graphql"

query CarouselTours(
  $filters: TourFiltersInput
  $pagination: PaginationArg
  $publicationState: PublicationState
  $sort: [String]
) {
  tours(
    filters: $filters
    pagination: $pagination
    publicationState: $publicationState
    sort: $sort
  ) {
    __typename
    ...TourMetaParts
    data {
      id
      attributes {
        ...TourPreviewParts
      }
    }
  }
}
